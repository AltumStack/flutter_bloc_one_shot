name: 📊 Code Coverage

on: [push, pull_request]

env:
  PUB_ENVIRONMENT: bot.github

jobs:
  test_with_coverage:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Checkout the Repository
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6

      # Setup Flutter SDK with Cache
      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Install Melos
      - name: 📦 Install Melos
        run: dart pub global activate melos

      # Bootstrap Workspace
      - name: 🔗 Bootstrap Workspace
        run: melos bootstrap

      # Run Dart Tests with Coverage (bloc_effect, bloc_effect_test)
      - name: ✅ Run Dart Tests with Coverage
        run: |
          cd packages/bloc_effect
          dart test --coverage=coverage
          dart pub global activate coverage
          format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
          cd ../..

      # Run Flutter Tests with Coverage (flutter_bloc_effect)
      - name: ✅ Run Flutter Tests with Coverage
        run: |
          cd packages/flutter_bloc_effect
          flutter test --coverage
          cd ../..

      # Run bloc_effect_test Tests
      - name: ✅ Run Test Helper Tests
        run: |
          cd packages/bloc_effect_test
          dart test
          cd ../..

      # Merge Coverage Reports
      - name: 📋 Merge Coverage Reports
        run: |
          mkdir -p coverage
          LCOV_ARGS=""
          for f in packages/*/coverage/lcov.info; do
            if [ -f "$f" ]; then
              LCOV_ARGS="$LCOV_ARGS -a $f"
            fi
          done
          if [ -n "$LCOV_ARGS" ]; then
            sudo apt-get install -y lcov > /dev/null 2>&1
            lcov $LCOV_ARGS -o coverage/lcov.info
          fi

      # Upload Coverage Report as Artifact
      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/lcov.info

      # Upload Coverage to Codecov
      - name: ☁️ Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: unittests
          name: codecov-flutter
          fail_ci_if_error: true
