name: 📊 Code Coverage

on: [push, pull_request]

env:
  PUB_ENVIRONMENT: bot.github

jobs:
  test_with_coverage:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Checkout the Repository
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6

      # Setup Flutter SDK with Cache
      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Install Melos
      - name: 📦 Install Melos
        run: dart pub global activate melos

      # Bootstrap Workspace
      - name: 🔗 Bootstrap Workspace
        run: melos bootstrap

      # Run Dart Tests with Coverage (bloc_one_shot)
      - name: ✅ Run bloc_one_shot Tests with Coverage
        run: |
          cd packages/bloc_one_shot
          dart test --coverage=coverage
          dart pub global activate coverage
          format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
          cd ../..

      # Run Flutter Tests with Coverage (flutter_bloc_one_shot)
      - name: ✅ Run flutter_bloc_one_shot Tests with Coverage
        run: |
          cd packages/flutter_bloc_one_shot
          flutter test --coverage
          cd ../..

      # Run bloc_one_shot_test Tests
      - name: ✅ Run bloc_one_shot_test Tests
        run: |
          cd packages/bloc_one_shot_test
          dart test
          cd ../..

      # Upload bloc_one_shot Coverage
      - name: ☁️ Upload bloc_one_shot Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/bloc_one_shot/coverage/lcov.info
          flags: bloc_one_shot
          name: bloc_one_shot
          fail_ci_if_error: true

      # Upload flutter_bloc_one_shot Coverage
      - name: ☁️ Upload flutter_bloc_one_shot Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/flutter_bloc_one_shot/coverage/lcov.info
          flags: flutter_bloc_one_shot
          name: flutter_bloc_one_shot
          fail_ci_if_error: true

      # Merge and Upload Combined Coverage
      - name: 📋 Merge Coverage Reports
        run: |
          sudo apt-get install -y lcov > /dev/null 2>&1
          mkdir -p coverage
          lcov \
            -a packages/bloc_one_shot/coverage/lcov.info \
            -a packages/flutter_bloc_one_shot/coverage/lcov.info \
            -o coverage/lcov.info

      # Upload Combined Coverage Report as Artifact
      - name: 📊 Upload Coverage Artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/lcov.info
