repository: https://github.com/aspect-build/bloc_one_shot/tree/main/packages/bloc_one_shot

environment:
  sdk: ^3.9.2

dependencies:
  bloc: ^9.0.0

dev_dependencies:
  test: ^1.24.0

resolution: workspace
