name: flutter_bloc_effect
description: >
  Flutter widgets for bloc_effect. Provides SideEffectListener and SideEffectConsumer
  widgets that mirror BlocListener/BlocConsumer API conventions.
version: 0.1.0
homepage: https://github.com/aspect-build/bloc_effect
repository: https://github.com/aspect-build/bloc_effect/tree/main/packages/flutter_bloc_effect

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  bloc_effect:
    path: ../bloc_effect

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0

resolution: workspace
